<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>World Time Zone Finder</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🌍 World Time Zone Finder</h1>

<div class="search-box">

    <input type="text" id="input" placeholder="Enter country (e.g., India, Japan)">
    
    <button onclick="search()">Show Time</button>

    <div id="suggestions"></div>

</div>
<div class="result">
<h2 id="country"></h2>
<p id="timezone"></p>
<p id="time"></p>
</div>

<script src="script.js"></script>

</body>
</html>
